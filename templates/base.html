<!DOCTYPE html>
{% set path = request.path %}

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>AHBSendApp</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="logo"
            style="font-family:'Outfit',sans-serif; font-weight:800; font-size:20px; letter-spacing:-0.5px;">AHB<span
                style="background:linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-left:4px;">Send</span><span
                style="font-weight:400; opacity:0.6; margin-left:4px; font-size:16px;">App</span></div>
        <div class="user">Admin</div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/" class="{% if path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/send" class="{% if path == '/send' or path == '/production' %}active{% endif %}">Campaigns</a>
        <a href="/emails" class="{% if path == '/emails' %}active{% endif %}">Emails</a>
        <a href="/contacts" class="{% if path == '/contacts' %}active{% endif %}">Contacts</a>
        <a href="/tags" class="{% if path == '/tags' %}active{% endif %}">Tags</a>
        <a href="/offers" class="{% if path == '/offers' %}active{% endif %}">Offres</a>
        <a href="/smtp" class="{% if path == '/smtp' %}active{% endif %}">SMTP</a>
        <a href="/bounce" class="{% if path == '/bounce' %}active{% endif %}">Bounce</a>
        <a href="/settings" class="{% if path == '/settings' %}active{% endif %}">Settings</a>
        <a href="/historique" class="{% if path == '/historique' %}active{% endif %}">Historique</a>

        <div style="flex-grow: 1;"></div>
        <a href="/logout"
            style="margin-top: auto; color: #ef4444; border-top: 1px solid #e2e8f0; padding-top: 15px; font-weight: 500;">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                style="vertical-align: text-bottom; margin-right: 6px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            Déconnexion
        </a>

        <div
            style="margin-top: 15px; font-size: 11px; color: #94a3b8; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 12px; line-height: 1.5;">
            <strong>AHBSendApp v1.0</strong><br>
            Powered by AHB Teams<br>
            © 2026 All rights reserved
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
